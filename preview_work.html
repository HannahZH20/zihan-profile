<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pro - UI/UX Design Portfolio (Glassmorphism)</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 极简无衬线字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                // 整体缩小一个字号（将默认字号档位下移）
                fontSize: {
                    'xs': ['0.65rem', { lineHeight: '1rem' }],
                    'sm': ['0.75rem', { lineHeight: '1.25rem' }],
                    'base': ['0.875rem', { lineHeight: '1.5rem' }],
                    'lg': ['1rem', { lineHeight: '1.75rem' }],
                    'xl': ['1.125rem', { lineHeight: '1.75rem' }],
                    '2xl': ['1.25rem', { lineHeight: '2rem' }],
                    '3xl': ['1.5rem', { lineHeight: '2.25rem' }],
                    '4xl': ['1.875rem', { lineHeight: '2.5rem' }],
                    '5xl': ['2.25rem', { lineHeight: '1' }],
                    '6xl': ['3rem', { lineHeight: '1' }],
                    '7xl': ['3.75rem', { lineHeight: '1' }],
                    '8xl': ['4.5rem', { lineHeight: '1' }],
                    '9xl': ['6rem', { lineHeight: '1' }],
                },
                extend: {
                    colors: {
                        aura: {
                            bg: '#F7F5F2',         // 温暖米白背景
                            ivory: '#F7F5F2',      // 浅色产品 UI 默认底色
                            surface: '#FFFFFF',    // 纯白表面
                            charcoal: '#2D2C2A',   // 深灰文字 (替代纯黑)
                            mutetext: '#8A8884',   // 辅助灰字
                            accent: '#F26B3A',     // 活力橙色点缀
                            accentLight: '#FCE7DF',// 浅橙色背景
                            sage: '#8F9B8C',
                            hero: '#0E1117',
                            night: '#11141B',
                            nightSoft: '#171B24',
                            nightCard: '#1C212C',
                            nightText: '#F2EEE8',
                            nightMuted: '#B6AEA3',
                            glass: 'rgba(255, 255, 255, 0.65)',
                            glassBorder: 'rgba(255, 255, 255, 0.8)',
                            nightLine: 'rgba(255,255,255,0.12)',
                        }
                    },
                    fontFamily: {
                        sans: ['"Poppins"', '"Noto Sans SC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.05)',
                        'hover': '0 20px 40px 0 rgba(242, 107, 58, 0.1)',
                        'phone': '0 42px 80px -28px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.08)',
                        'nav': '0 -10px 40px rgba(0,0,0,0.04)',
                        'btn': '0 8px 20px rgba(242, 107, 58, 0.25)',
                        'elegant': '0 18px 40px -18px rgba(0,0,0,0.35)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --aura-night-0: #0E1117;
            --aura-night-1: #121720;
            --aura-night-2: #171C26;
            --aura-night-card: rgba(255, 255, 255, 0.05);
            --aura-night-line: rgba(255, 255, 255, 0.12);
            --aura-night-text: #F2EEE8;
            --aura-night-muted: #B6AEA3;
            --aura-accent: #F26B3A;
        }
        body {
            margin: 0;
            font-family: 'Poppins', 'Noto Sans SC', sans-serif;
            background:
                radial-gradient(1200px 520px at 110% -10%, rgba(242, 107, 58, 0.08), transparent 65%),
                radial-gradient(900px 420px at -10% 110%, rgba(143, 155, 140, 0.08), transparent 68%),
                linear-gradient(180deg, #F7F5F2 0%, #F7F5F2 100%);
            color: var(--aura-night-text);
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 修复毛玻璃、绝对定位导致的圆角边界溢出 bug */
        .phone-screen {
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            mask-image: radial-gradient(white, black);
            isolation: isolate;
        }

        /* 玻璃拟态基础类 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .glass-panel-dark {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--aura-night-line);
            box-shadow: 0 16px 42px -24px rgba(0, 0, 0, 0.8);
        }
        .card-hover {
            transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), filter 0.28s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-hover:hover {
            transform: translateY(-6px);
            filter: drop-shadow(0 16px 28px rgba(242, 107, 58, 0.12));
        }
        .board-shell {
            background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.82));
            border: 1px solid rgba(212, 197, 185, 0.38);
            box-shadow: 0 24px 60px -36px rgba(45, 44, 42, 0.18);
        }
        .paper-line {
            background: linear-gradient(90deg, rgba(45,44,42,0.06), rgba(45,44,42,0.16), rgba(45,44,42,0.06));
        }
        .board-grid {
            background-image:
                linear-gradient(rgba(45,44,42,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45,44,42,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .portfolio-wash {
            background:
                radial-gradient(600px 280px at 0% 0%, rgba(242,107,58,0.06), transparent 65%),
                radial-gradient(540px 260px at 100% 100%, rgba(143,155,140,0.08), transparent 70%);
        }

        .case-shell { color: var(--aura-night-text); }
        .case-section {
            background: #F7F5F2;
            border-color: rgba(0, 0, 0, 0.05);
            position: relative;
        }
        .case-section-soft {
            background: #F7F5F2;
            border-color: rgba(0, 0, 0, 0.05);
        }
        .case-hero {
            background:
                radial-gradient(800px 420px at 90% 10%, rgba(242, 107, 58, 0.18), transparent 70%),
                radial-gradient(700px 360px at 10% 90%, rgba(143, 155, 140, 0.14), transparent 72%),
                linear-gradient(180deg, #0B0E14 0%, #11141C 100%);
        }
        .editorial-tag {
            background: rgba(242, 107, 58, 0.14);
            border: 1px solid rgba(242, 107, 58, 0.32);
            color: #FFAE8F;
        }
        .editorial-tag-soft {
            background: rgba(143, 155, 140, 0.14);
            border: 1px solid rgba(143, 155, 140, 0.32);
            color: #C9D2C7;
        }
        .editorial-card {
            background: var(--aura-night-card);
            border: 1px solid var(--aura-night-line);
            box-shadow: 0 20px 48px -28px rgba(0, 0, 0, 0.85);
        }
        .editorial-chip {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #D3CBC1;
        }
        .editorial-axis {
            border-color: rgba(255, 255, 255, 0.28);
        }

        .waveform-bar {
            width: 3px;
            border-radius: 999px;
            background: currentColor;
            animation: waveform 1.2s ease-in-out infinite;
        }
        @keyframes waveform {
            0%, 100% { transform: scaleY(0.65); opacity: 0.7; }
            50% { transform: scaleY(1.15); opacity: 1; }
        }

        /* 动效 */
        .fade-up { animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(30px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        
        .breathe { animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); box-shadow: 0 15px 30px rgba(242,107,58,0.15); } }

        /* 动态折线图动画 */
        .line-chart-anim {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 3s ease-out forwards infinite alternate;
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes scan {
            0% { transform: translateY(-220px); opacity: 0; }
            25% { opacity: 1; }
            50% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(220px); opacity: 0; }
        }

        /* 表单输入框去边框 */
        .borderless-input { border: none !important; outline: none !important; background: transparent; }
        .tab-safe { padding-bottom: 6.5rem; }
    </style>
</head>
<body>
    <!-- SVG 矢量图标库 (使用 <symbol> 集中定义) -->
    <svg aria-hidden="true" style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <symbol id="icon-wifi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></symbol>
            <symbol id="icon-battery" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"></rect><line x1="23" y1="13" x2="23" y2="11"></line></symbol>
            <symbol id="icon-signal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h.01"></path><path d="M7 20v-4"></path><path d="M12 20v-8"></path><path d="M17 20V8"></path><path d="M22 4v16"></path></symbol>
            <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></symbol>
            <symbol id="icon-compass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></symbol>
            <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
            <symbol id="icon-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></symbol>
            <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
            <symbol id="icon-sparkle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path></symbol>
            <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></symbol>
            <symbol id="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></symbol>
            <symbol id="icon-map-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></symbol>
            <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
            <symbol id="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></symbol>
            <symbol id="icon-pen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></symbol>
            <symbol id="icon-arrow-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></symbol>
            <symbol id="icon-database" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></symbol>
            <symbol id="icon-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.5 2A2.5 2.5 0 0 0 7 4.5v15a2.5 2.5 0 0 0 4.9 1.25l.1-.5V4.5A2.5 2.5 0 0 0 9.5 2z"></path><path d="M14.5 2A2.5 2.5 0 0 1 17 4.5v15a2.5 2.5 0 0 1-4.9 1.25l-.1-.5V4.5A2.5 2.5 0 0 1 14.5 2z"></path><path d="M2 12h5"></path><path d="M17 12h5"></path></symbol>

    </svg>

    <div id="root"></div>

    <script type="text/babel">
        // --- 通用图标组件 ---
        const Icon = ({ name, className = "w-5 h-5" }) => (
            <svg className={className}><use href={`#icon-${name}`} /></svg>
        );

        const SvgPhoto = ({ src, className = "w-full h-full rounded-2xl" }) => (
            <svg viewBox="0 0 320 220" className={className} preserveAspectRatio="xMidYMid slice" style={{ overflow: 'hidden' }}>
                <image href={src} width="320" height="220" preserveAspectRatio="xMidYMid slice" />
            </svg>
        );

        // --- 状态栏 ---
        const StatusBar = ({ isDark = false }) => {
            const colorClass = isDark ? "text-white drop-shadow-md" : "text-aura-charcoal";
            return (
                <div className={`w-full h-12 px-6 flex justify-between items-center z-50 relative shrink-0 text-[12px] font-semibold tracking-wide ${colorClass}`}>
                    <span>9:41</span>
                    <div className="flex items-center space-x-1.5">
                        <Icon name="signal" className="w-3.5 h-3.5" />
                        <Icon name="wifi" className="w-3.5 h-3.5" />
                        <Icon name="battery" className="w-5 h-5" />
                    </div>
                </div>
            );
        };

        // --- 全局底部标签栏 (Glassmorphism Tab Bar) ---
        const BottomNav = ({ active = 'home' }) => (
            <div className="absolute bottom-0 w-full h-[88px] glass-panel border-b-0 border-x-0 flex justify-between items-start px-6 pt-3 z-[100] shadow-nav rounded-t-[2.5rem] rounded-b-[3.2rem]">
                <div className={`flex flex-col items-center ${active === 'home' ? 'text-aura-accent' : 'text-aura-mutetext'}`}>
                    <Icon name="home" className="w-6 h-6 mb-1" />
                    <span className="text-[8px] font-medium">首页</span>
                </div>
                <div className={`flex flex-col items-center ${active === 'explore' ? 'text-aura-accent' : 'text-aura-mutetext'}`}>
                    <Icon name="compass" className="w-6 h-6 mb-1" />
                    <span className="text-[8px] font-medium">探索</span>
                </div>
                
                {/* 悬浮发布按钮 */}
                <div className="relative -top-8 breathe">
                    <div className="w-14 h-14 bg-aura-accent rounded-full flex items-center justify-center text-white shadow-btn cursor-pointer">
                        <Icon name="plus" className="w-6 h-6" />
                    </div>
                </div>
                
                <div className={`flex flex-col items-center ${active === 'gallery' ? 'text-aura-accent' : 'text-aura-mutetext'}`}>
                    <Icon name="grid" className="w-6 h-6 mb-1" />
                    <span className="text-[8px] font-medium">画廊</span>
                </div>
                <div className={`flex flex-col items-center ${active === 'profile' ? 'text-aura-accent' : 'text-aura-mutetext'}`}>
                    <Icon name="user" className="w-6 h-6 mb-1" />
                    <span className="text-[8px] font-medium">我的</span>
                </div>
            </div>
        );

        // --- 手机画板容器 ---
        const PhoneFrame = ({ children, isDarkDevice = false, label, step }) => {
            const containerRef = React.useRef(null);
            const [scale, setScale] = React.useState(1);
            const screenTheme = isDarkDevice ? 'bg-black text-white' : 'bg-aura-bg text-aura-charcoal';
            
            // 为所有设备统一设置明显的黑灰色 1px 物理硬件边框
            const borderColor = 'border-[#151515]';

            React.useLayoutEffect(() => {
                if (!containerRef.current) return;
                const node = containerRef.current;
                const updateScale = () => {
                    // 全自适应：根据父容器宽度灵活缩放 375x812 画板
                    const nextScale = node.clientWidth / 375;
                    setScale(nextScale > 1 ? 1 : nextScale);
                };

                updateScale();

                const observer = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(updateScale) : null;
                if (observer) observer.observe(node);
                window.addEventListener('resize', updateScale);

                return () => {
                    if (observer) observer.disconnect();
                    window.removeEventListener('resize', updateScale);
                };
            }, []);

            return (
                <div ref={containerRef} className="flex flex-col items-center w-full mx-auto group">
                    <div className="relative w-full flex justify-center" style={{ height: `${812 * scale}px` }}>
                        <div
                            className={`w-[375px] h-[812px] shrink-0 rounded-[3.2rem] border-[12px] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.15)] relative flex flex-col z-10 transition-transform duration-500 group-hover:-translate-y-3 overflow-hidden isolation-auto ${screenTheme} ${borderColor}`}
                            style={{ transform: `scale(${scale})`, transformOrigin: 'top center' }}
                        >
                            {/* 硬件刘海模拟：颜色匹配黑色硬件外边框 */}
                            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[120px] h-7 rounded-b-[1.2rem] bg-[#151515] z-[100]"></div>
                            
                            {/* 屏幕内容容器 */}
                            <div className="flex-1 flex flex-col relative w-full h-full">
                                {children}
                            </div>
                        </div>
                    </div>
                    <div className="mt-8 text-center w-full px-4 transition-opacity duration-300">
                        <div className="text-aura-accent font-bold text-[10px] uppercase tracking-widest mb-2 flex items-center justify-center">
                            <span className="w-1.5 h-1.5 rounded-full bg-aura-accent mr-2"></span>
                            步骤 {step}
                        </div>
                        <p className="text-[13px] font-medium text-aura-charcoal">{label}</p>
                    </div>
                </div>
            );
        };

        // --- 作品集统一页眉系统 ---
        const PortfolioHeader = ({ eyebrow, project = "Aura Pro", title, subtitle, compact = false }) => (
            <div className={`${compact ? 'mb-8' : 'mb-10'} w-full`}>
                <div className="paper-line h-px w-full mb-5"></div>
                <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
                    <div>
                        <div className="text-[10px] uppercase tracking-[0.32em] text-aura-accent font-bold mb-3">{eyebrow}</div>
                        <h2 className={`${compact ? 'text-3xl lg:text-4xl' : 'text-4xl lg:text-5xl'} font-bold text-aura-charcoal tracking-tight leading-tight`}>{title}</h2>
                        {subtitle && <p className="text-aura-mutetext text-sm lg:text-base mt-3 max-w-3xl leading-relaxed">{subtitle}</p>}
                    </div>
                    <div className="flex items-center gap-3 self-start lg:self-auto">
                        <div className="w-2.5 h-2.5 rounded-full bg-aura-accent"></div>
                        <span className="text-[10px] uppercase tracking-[0.28em] text-aura-mutetext font-bold">{project}</span>
                    </div>
                </div>
            </div>
